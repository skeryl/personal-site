name: CI

on:
  pull_request:

jobs:
  check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: svelte-check
        run: npm run check -w @sc/ui

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Format auto-generated files
        working-directory: packages/ui
        run: npx prettier --write src/lib/entries/index.ts src/lib/assets/videos/posts/index.ts
      - name: prettier
        working-directory: packages/ui
        run: npx prettier --check .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: vitest
        working-directory: packages/ui
        run: npx vitest run

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: build
        env:
          BASE_PATH: "/${{ github.event.repository.name }}"
        run: npm run build -w @sc/ui

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Install Playwright
        working-directory: packages/ui
        run: npx playwright install chromium --with-deps
      - name: Playwright smoke tests
        working-directory: packages/ui
        run: npx playwright test
