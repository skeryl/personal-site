name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  cleanup-preview:
    name: Cleanup Preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Netlify preview deploy
        run: |
          DEPLOYS=$(curl -sf -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys?per_page=100")
          DEPLOY_ID=$(echo "$DEPLOYS" | jq -r '.[] | select(.deploy_ssl_url != null and (.deploy_ssl_url | contains("pr-${{ github.event.number }}"))) | .id' | head -1)
          if [ -n "$DEPLOY_ID" ]; then
            curl -sf -X DELETE -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/deploys/$DEPLOY_ID"
            echo "Deleted deploy $DEPLOY_ID for PR #${{ github.event.number }}"
          else
            echo "No deploy found for PR #${{ github.event.number }}"
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  check:
    name: Type Check
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: svelte-check
        run: npm run check -w @sc/ui

  lint:
    name: Lint
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Format auto-generated files
        working-directory: packages/ui
        run: npx prettier --write src/lib/entries/index.ts src/lib/assets/videos/posts/index.ts
      - name: prettier
        working-directory: packages/ui
        run: npx prettier --check .

  test:
    name: Unit Tests
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: vitest
        working-directory: packages/ui
        run: npx vitest run

  build:
    name: Build
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: build
        run: npm run build -w @sc/ui
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: packages/ui/build/

  preview:
    name: Preview Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build/
      - name: Deploy to Netlify
        id: netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: build/
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'PR #${{ github.event.number }}: ${{ github.event.pull_request.title }}'
          alias: pr-${{ github.event.number }}
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  smoke:
    name: Smoke Tests
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Install Playwright
        working-directory: packages/ui
        run: npx playwright install chromium --with-deps
      - name: Playwright smoke tests
        working-directory: packages/ui
        run: npx playwright test
